services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fiscalflow
      POSTGRES_USER: fiscalflow
      POSTGRES_PASSWORD: fiscalflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscalflow -d fiscalflow"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - fiscalflow_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://database:5432/fiscalflow
      DATABASE_USER: fiscalflow
      DATABASE_PASSWORD: fiscalflow
      CORS_ORIGIN: http://localhost:4180
      SEED_DEMO: "true"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "4180:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  fiscalflow_data:
