name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew
      - name: Test backend with PostgreSQL Testcontainers
        working-directory: backend
        run: ./gradlew clean test --no-daemon

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build

  end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start the complete stack
        run: docker compose up -d --build --wait
      - name: Verify seeded workflow through the frontend gateway
        run: |
          curl --fail http://localhost:4180/actuator/health
          curl --fail http://localhost:4180/api/v1/dashboard
          curl --fail http://localhost:4180/api/v1/documents
      - name: Collect container logs
        if: failure()
        run: docker compose logs
      - name: Clean stack
        if: always()
        run: docker compose down --volumes
